<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>wino*</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Manrope', sans-serif;
  background:#0a0a0a;
  color:#e5e5e5;
}

/* NAV */
.nav {
  display:flex;
  justify-content:space-between;
  padding:20px;
  border-bottom:1px solid #151515;
}

.logo {color:#a78bfa;}

/* BEATS */
.container {padding:25px;}

.beat {
  padding:15px;
  border-bottom:1px solid #1a1a1a;
  cursor:pointer;
}

.beat:hover {background:#111;}

.titulo {font-size:14px;}

.wave {
  display:flex;
  gap:2px;
  margin-top:8px;
}

.bar {
  width:3px;
  height:10px;
  background:#444;
  animation: wave 1s infinite ease-in-out;
}

.bar:nth-child(2){animation-delay:0.1s}
.bar:nth-child(3){animation-delay:0.2s}
.bar:nth-child(4){animation-delay:0.3s}
.bar:nth-child(5){animation-delay:0.4s}

@keyframes wave {
  0%,100%{height:10px}
  50%{height:18px}
}

/* PLAYER */
.player {
  position:fixed;
  bottom:0;
  width:100%;
  background:#0d0d0d;
  padding:10px;
}

.controls {
  display:flex;
  align-items:center;
  gap:10px;
}

.play {
  width:30px;
  height:30px;
  border-radius:50%;
  background:#a78bfa;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">wino*</div>
</div>

<div class="container" id="lista"></div>

<div class="player">
  <div id="tocando">Nada tocando</div>
  <div class="controls">
    <div class="play" onclick="toggle()">▶</div>
  </div>
</div>

<audio id="audio"></audio>

<script>
let audio = document.getElementById("audio")
let atual = null

let beats = [
  {nome:"plug 140", src:"beat1.mp3"},
  {nome:"rage 150", src:"beat2.mp3"}
]

function render(){
  lista.innerHTML=""
  beats.forEach((b,i)=>{
    lista.innerHTML += `
    <div class="beat" onclick="play(${i})">
      <div class="titulo">${b.nome}</div>
      <div class="wave">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      </div>
    </div>`
  })
}

function play(i){
  atual = i
  audio.src = beats[i].src
  audio.play()
  tocando.innerText = beats[i].nome
}

function toggle(){
  if(audio.paused) audio.play()
  else audio.pause()
}

audio.onended = ()=>{
  if(atual < beats.length-1){
    play(atual+1)
  }
}

render()
</script>

</body>
</html>
